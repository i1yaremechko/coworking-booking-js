<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Coworking Booking</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css"
      integrity="sha256-WAgYcAck1C1/zEl5sBl5cfyhxtLgKGdpI3oKyJffVRI="
      crossorigin="anonymous"
    />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:400,700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.11.2/css/all.css"
      integrity="sha256-46qynGAkLSFpVbEBog43gvNhfrOj+BmwXdxFgVK/Kvc="
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page">
    <header class="header">
      <button class="button booking-desk-btn">
        <i class="fas fa-plus booking-desk-btn__icon"></i>Booking
      </button>
      <nav class="navigation">
        <button data-direction="today" class="navigation__today-btn button">
          Today
        </button>
        <button data-direction="prev" class="icon-button navigation__nav-icon">
          <i class="fas fa-chevron-left"></i>
        </button>
        <button data-direction="next" class="icon-button navigation__nav-icon">
          <i class="fas fa-chevron-right"></i>
        </button>
        <span class="navigation__displayed-day">18 Apr 2026</span>
      </nav>
      <span class="title">COWORKING SPACE</span>
    </header>
    <main class="booking">
      <header class="booking__header">
        <div
          class="booking__header-days-container"
          style="display: flex; flex: 1"
        ></div>
      </header>
      <div class="booking__body">
        <div class="booking__time-scale"></div>
        <div class="booking__workspaces-grid"></div>
      </div>
    </main>
    <div class="modal hidden overlay">
      <div class="modal__content">
        <form class="booking-form">
          <button type="button" class="booking-form__close-btn">
            <i class="fas fa-times"></i>
          </button>
          <input
            type="text"
            name="userName"
            placeholder="User Name"
            class="booking-form__field"
            required
          />
          <div class="booking-form__settings">
            <input type="date" name="date" class="booking-form__field" />
            <select name="workspaceId" class="booking-form__field">
              <option value="1">Desk 1</option>
              <option value="2">Desk 2</option>
              <option value="3">Desk 3</option>
              <option value="4">Desk 4</option>
              <option value="5">Desk 5</option>
            </select>
          </div>

          <div class="booking-form__time">
            <input type="time" name="startTime" class="booking-form__field" />
            <span>-</span>
            <input type="time" name="endTime" class="booking-form__field" />
          </div>

          <textarea
            name="description"
            placeholder="Description"
            class="booking-form__field"
          ></textarea>

          <div class="booking-form__confirm-msg hidden">
            Do you really want to book this desk?
          </div>

          <button type="submit" class="booking-form__submit-btn">Create</button>

          <button type="button" class="booking-form__delete-btn hidden">
            Delete
          </button>
        </form>
      </div>
    </div>
    <script src="scripts/index.js" type="module"></script>
  </body>
</html>
